<div class="card mb-3 shadow">
    <div class="card-body">
        <script id="markdown-source" type="application/json">"## \u5377\u79ef\r\n\r\n\u5168\u8fde\u63a5\u5c42\u8f93\u5165\u8f93\u51fa\u53d8\u4e3a\u77e9\u9635$(h, w)$\uff0c\u6743\u91cd\u53d8\u4e3a\u56db\u7ef4\u5f20\u91cf$(h, w)\\rightarrow(h', w')$\r\n$$\r\nh_{i, j} = \\sum_{k, l}W_{i, j, k, l}x_{k, l} = \\sum_{a, b}V_{i, j, a, b}x_{i + a, j + b}\r\n$$\r\n\u5176\u4e2d$V_{i, j, k, l} = W_{i, j, i + a, j + b}$\r\n\r\n### \u539f\u52191\uff1a\u5e73\u79fb\u4e0d\u53d8\u6027\r\n\r\n$x$\u7684\u5e73\u79fb\u5bfc\u81f4$h$\u7684\u5e73\u79fb\uff0c\u800c$V$\u4e0d\u5e94\u4f9d\u8d56\u4e8e$i, j$\r\n\r\n\u56e0\u6b64\uff0c$V_{i, j, a, b}\\rightarrow V_{a, b}$\u4f7fV\u5177\u6709\u5e73\u79fb\u7684\u4e0d\u53d8\u6027\r\n\r\n\u4ece\u800c\u5f97\u5230\u4e8c\u7ef4\u5377\u79ef\uff08\u4ea4\u53c9\u76f8\u5173\uff09\uff1a\r\n$$\r\nh_{i, j} = \\sum_{a, b}V_{a, b}x_{i + a, j + b}\r\n$$\r\n\r\n### \u539f\u52192\uff1a\u5c40\u90e8\u6027\r\n\r\n\u5f53\u8bc4\u4f30$h_{i, j}$\u65f6\uff0c\u4e0d\u5e94\u4f7f\u7528\u8fdc\u79bb$x_{i, j}$\u7684\u6570\u636e\r\n\r\n\u56e0\u6b64\uff0c\u89c4\u5b9a\u4e00\u4e2a$\\Delta$\uff0c\u5f53$|a|, |b| \u003E \\Delta$\u65f6\uff0c\u4f7f\u5f97$V_{a, b} = 0$\r\n$$\r\nh_{i, j} = \\sum_{a = -\\Delta}^{\\Delta}\\sum_{b = -\\Delta}^{\\Delta}V_{a, b}x_{i + a, y + b}\r\n$$\r\n\r\n## \u4e8c\u7ef4\u5377\u79ef\u5c42\r\n\r\n\u8f93\u5165$X: n_h \\times n_w$\r\n\r\n\u5377\u79ef\u6838$W: k_h \\times k_w$\r\n\r\n\u504f\u5dee$b \\in \\mathbb{R}$\r\n\r\n\u8f93\u51fa$Y = X \\cdot W + b: (n_h - k_h + 1) \\times (n_w - k_w + 1)$\r\n\r\n\u6838\u77e9\u9635\u548c\u504f\u5dee\u4e3a\u53ef\u5b66\u4e60\u53c2\u6570\uff0c\u6838\u77e9\u9635\u7684\u5927\u5c0f\u4e3a\u8d85\u53c2\u6570\r\n\r\n### \u5b9e\u73b0\r\n\r\n```python\r\nimport torch\r\nfrom torch import nn\r\n\r\n# 2D\u4e92\u76f8\u5173\r\ndef corr2d(X, K):\r\n    h, w = K.shape\r\n    Y = torch.zeros((X.shape[0] - h + 1, X.shape[1] - w + 1))\r\n    for i in range(Y.shape[0]):\r\n        for j in range(Y.shape[1]):\r\n            Y[i, j] = (X[i:i + h, j:j + w] * K).sum()\r\n    return Y\r\n\r\nclass Conv2D(nn.Module):\r\n    def __init__(self, kernel_size):\r\n        super().__init__()\r\n        self.weight = nn.Parameter(torch.rand(kernel_size))\r\n        self.bias = nn.Parameter(torch.zeros(1))\r\n\r\n    def forward(self, x):\r\n        return corr2d(x, self.weight) + self.bias\r\n\r\n# \u6b64\u5904\u4e3atorch.nn\u7684Conv2d\r\n# class torch.nn.Conv2d(in_channels, out_channels, kernel_size, stride=1, padding=0, dilation=1, groups=1, bias=True, padding_mode='zeros', device=None, dtype=None)\r\n\r\nconv2d = nn.Conv2d(1,1, kernel_size=(1, 2), bias=False)\r\noptimizer = torch.optim.SGD(conv2d.parameters(), lr=3e-2)\r\n\r\n# \u8fd9\u4e2a\u4e8c\u7ef4\u5377\u79ef\u5c42\u4f7f\u7528\u56db\u7ef4\u8f93\u5165\u548c\u8f93\u51fa\u683c\u5f0f\uff08\u6279\u91cf\u5927\u5c0f\u3001\u901a\u9053\u3001\u9ad8\u5ea6\u3001\u5bbd\u5ea6\uff09\uff0c\r\n# \u5176\u4e2d\u6279\u91cf\u5927\u5c0f\u548c\u901a\u9053\u6570\u90fd\u4e3a1\r\nX = X.reshape((1, 1, 6, 8))\r\nY = Y.reshape((1, 1, 6, 7))\r\n\r\nfor i in range(10):\r\n    Y_hat = conv2d(X)\r\n    l = (Y_hat - Y) ** 2\r\n    conv2d.zero_grad()\r\n    l.sum().backward()\r\n    optimizer.step()\r\n    if (i + 1) % 2 == 0:\r\n        print(f'epoch {i+1}, loss {l.sum():.3f}')\r\n```\r\n\r\n## \u586b\u5145\r\n\r\n\u6c42\u5377\u79ef\u540e$Y: (n_h - k_h + 1) \\times (n_w - k_w + 1)$\u5f62\u72b6\u6bcf\u6b21\u90fd\u4f1a\u53d8\u5c0f\r\n\r\n\u586b\u5145$p_h$\u884c$p_W$\u5217\uff0c\u8f93\u51fa\u5f62\u72b6\u4e3a$(n_h - k_h + p_h + 1) \\times (n_w - k_w + p_w + 1)$\r\n\r\n\u901a\u5e38\u53d6$p_h = k_h - 1, p_w = k_w - 1$\r\n\r\n- $k_h$\u4e3a\u5076\u6570\uff1a\u4e0a\u4e0b\u4e24\u4fa7\u5404\u586b\u5145$p_h / 2$\r\n- $k_h$\u4e3a\u5947\u6570\uff1a\u4e0a\u4fa7\u586b\u5145$\\lceil k_h / 2 \\rceil$\uff0c\u4e0b\u4fa7\u586b\u5145$\\lfloor k_h / 2 \\rfloor$\r\n\r\n## \u6b65\u5e45\r\n\r\n\u586b\u5145\u51cf\u5c0f\u7684\u8f93\u51fa\u5927\u5c0f\u4e0e\u5c42\u6570\u7ebf\u6027\u76f8\u5173\r\n\r\n\u7ed9\u5b9a\u9ad8\u5ea6$s_h$\u5bbd\u5ea6$s_w$\u7684\u6b65\u5e45\uff0c\u8f93\u51fa\u5f62\u72b6\u4e3a$\\lfloor (n_h - k_h + p_h + s_h) / s_h \\rfloor \\times \\lfloor (n_w - k_w + p_w + s_w) / s_w \\rfloor$\r\n\r\n\u82e5$p_h = k_h - 1, p_w = k_w - 1$\uff0c\u5219\u8f93\u51fa\u5f62\u72b6\u4e3a$\\lfloor (n_h + s_h - 1) / s_h \\rfloor \\times \\lfloor (n_w + s_w - 1) / s_w \\rfloor$\r\n\r\n\u82e5\u8f93\u5165\u9ad8\u5ea6\u548c\u5bbd\u5ea6\u53ef\u4ee5\u88ab\u6b65\u957f\u6574\u9664\uff0c\u5219\u8f93\u51fa\u5f62\u72b6\u4e3a$(n_h / s_h) \\times (n_w / s_w)$\r\n\r\n## \u8f93\u5165\u8f93\u51fa\u901a\u9053\r\n\r\n### \u591a\u8f93\u5165\u901a\u9053\r\n\r\n\u6bcf\u4e2a\u901a\u9053\u90fd\u6709\u4e00\u4e2a\u5377\u79ef\u6838\uff0c\u7ed3\u679c\u662f\u6240\u6709\u901a\u9053\u5377\u79ef\u7ed3\u679c\u7684\u548c\r\n\r\n\u8f93\u5165$X: c_i \\times n_h \\times n_w$\r\n\r\n\u6838$W: c_i \\times k_h \\times k_w$\r\n\r\n\u8f93\u51fa$Y: m_h \\times m_w$\r\n\r\n### \u591a\u8f93\u51fa\u901a\u9053\r\n\r\n\u591a\u4e2a\u4e09\u7ef4\u5377\u79ef\u6838\uff0c\u6bcf\u4e2a\u6838\u751f\u6210\u4e00\u4e2a\u8f93\u51fa\u901a\u9053\r\n\r\n\u8f93\u5165$X: c_i \\times n_h \\times n_w$\r\n\r\n\u6838$W: c_o \\times c_i \\times k_h \\times k_w$\r\n\r\n\u8f93\u51fa$Y: c_o \\times m_h \\times m_w$\r\n\r\n## 1x1\u5377\u79ef\u5c42\r\n\r\n$k_h = k_w = 1$\u4e0d\u8bc6\u522b\u7a7a\u95f4\u6a21\u5f0f\uff0c\u53ea\u662f\u878d\u5408\u901a\u9053\r\n\r\n\u76f8\u5f53\u4e8e\u8f93\u5165\u5f62\u72b6$n_h n_w \\times c_i$\uff0c\u6743\u91cd\u4e3a$c_o \\times c_i$\u7684\u5168\u8fde\u63a5\u5c42\r\n\r\n## \u6c60\u5316\u5c42\r\n\r\n\u5377\u79ef\u5bf9\u4f4d\u7f6e\u654f\u611f\u3002\u9700\u8981\u4e00\u5b9a\u7a0b\u5ea6\u7684\u5e73\u79fb\u4e0d\u53d8\u6027\r\n\r\n### \u4e8c\u7ef4\u6700\u5927\u6c60\u5316\r\n\r\n\u8fd4\u56de\u6ed1\u52a8\u7a97\u53e3\u4e2d\u7684\u6700\u5927\u503c\r\n\r\n\u5177\u6709\u586b\u5145\u6b65\u5e45\uff0c\u6ca1\u6709\u53ef\u5b66\u4e60\u53c2\u6570\uff0c\u5728\u6bcf\u4e2a\u901a\u9053\u5e94\u7528\u6c60\u5316\u5c42\u83b7\u5f97\u5bf9\u5e94\u8f93\u51fa\u901a\u9053\uff0c\u8f93\u51fa\u901a\u9053\u6570=\u8f93\u5165\u901a\u9053\u6570\r\n\r\n### \u5e73\u5747\u6c60\u5316\u5c42\r\n\r\n\u5c06\u6700\u5927\u6c60\u5316\u5c42\u4e2d\u7684\u6700\u5927\u64cd\u4f5c\u66ff\u6362\u4e3a\u5e73\u5747\r\n\r\n## LeNet\r\n\r\n```python\r\nimport torch\r\nfrom torch import nn\r\n\r\nclass Reshape(nn.Module):\r\n    def foward(self, x):\r\n        return x.view(-1, 1, 28, 28)\r\n    \r\nnet = nn.Sequential(\r\n\tReshape(),\r\n\tnn.Conv2d(1, 6, kernel_size=5, padding=2), nn.Sigmoid(),\r\n\tnn.AvgPool2d(kernel_size=2, stride=2),\r\n\tnn.Conv2d(6, 16, kernel_size=5), nn.Sigmoid(),\r\n\tnn.AvgPoll2d(kernel_size=2, stride=2), nn.Flatten(),\r\n\tnn.Linear(16 * 5 * 5, 120), nn.Sigmoid(),\r\n\tnn.Linear(120, 84), nn.Sigmoid(),\r\n\tnn.Linear(84, 10))\r\n```\r\n\r\n## AlexNet\r\n\r\n\u66f4\u6df1\u66f4\u5927\u7684LeNet\r\n\r\n\u4e3b\u8981\u6539\u8fdb\uff1a\u4e22\u5f03\u6cd5\uff0cReLU\uff0cMaxPooling\r\n\r\n```python\r\nimport torch\r\nfrom torch import nn\r\n\r\nnet = nn.Sequential(\r\n    nn.Conv2d(3, 96, kernel_size=11, stride=4, padding=1), nn.ReLU(),\r\n    nn.MaxPool2d(kernel_size=3, stride=2),\r\n    nn.Conv2d(96, 256, kernel_size=5, padding=2), nn.ReLU(),\r\n    nn.MaxPool2d(kernel_size=3, stride=2),\r\n    nn.Conv2d(256, 384, kernel_size=3, padding=1), nn.ReLU(),\r\n    nn.Conv2d(384, 384, kernel_size=3, padding=1), nn.ReLU(),\r\n    nn.Conv2d(384, 384, kernel_size=3, padding=1), nn.ReLU(),\r\n    nn.MaxPool2d(kernel_size=3, stride=2),\r\n    nn.Flatten(),\r\n    nn.Linear(6400, 4096), nn.ReLU(),\r\n    nn.Dropout(p=0.5),\r\n    nn.Linear(4096, 4096), nn.ReLU(),\r\n    nn.Dropout(p=0.5),\r\n    nn.Linear(4096, 1000))\r\n```\r\n\r\n## VGG\r\n\r\n### VGG\u5757\r\n\r\n3 x 3\u5377\u79ef\uff0c\u586b\u51451\uff0cn\u5c42m\u901a\u9053\r\n\r\n2 x 2\u6700\u5927\u6c60\u5316\u5c42\uff0c\u6b65\u5e452\r\n\r\n### VGG\u67b6\u6784\r\n\r\n\u591a\u4e2aVGG\u5757\u540e\u63a5\u5168\u8fde\u63a5\u5c42\r\n\r\n\u4e0d\u540c\u7684\u91cd\u590d\u6b21\u6570\u5f97\u5230\u4e0d\u540c\u7684\u67b6\u6784\uff0cVGG-16\uff0cVGG-19\uff0c\u2026\u2026\r\n\r\n```python\r\nimport torch\r\nfrom torch import nn\r\n\r\ndef vgg_block(num_convs, in_channels, out_channels):\r\n    layers = []\r\n    for _ in range(num_convs):\r\n        layers.append(nn.Conv2d(in_channels, out_channels,\r\n                                kernel_size=3, padding=1))\r\n        layers.append(nn.ReLU())\r\n        in_channels = out_channels\r\n    layers.append(nn.MaxPool2d(kernel_size=2,stride=2))\r\n    return nn.Sequential(*layers)\r\n\r\nconv_arch = ((1, 64), (1, 128), (2, 256), (2, 512), (2, 512))\r\n\r\ndef vgg(conv_arch):\r\n    conv_blks = []\r\n    in_channels = 1\r\n    # \u5377\u79ef\u5c42\u90e8\u5206\r\n    for (num_convs, out_channels) in conv_arch:\r\n        conv_blks.append(vgg_block(num_convs, in_channels, out_channels))\r\n        in_channels = out_channels\r\n\r\n    return nn.Sequential(\r\n        *conv_blks, nn.Flatten(),\r\n        # \u5168\u8fde\u63a5\u5c42\u90e8\u5206\r\n        nn.Linear(out_channels * 7 * 7, 4096), nn.ReLU(), nn.Dropout(0.5),\r\n        nn.Linear(4096, 4096), nn.ReLU(), nn.Dropout(0.5),\r\n        nn.Linear(4096, 10))\r\n\r\nnet = vgg(conv_arch)\r\n```\r\n\r\n## NiN\r\n\r\n\u5377\u79ef\u5c42\u53c2\u6570\u8f83\u5c11$c_i \\times c_o \\times k ^ 2$\uff0c\u4f46\u662f\u5377\u79ef\u5c42\u540e\u7b2c\u4e00\u4e2a\u5168\u8fde\u63a5\u5c42\u53c2\u6570\u5de8\u5927\r\n\r\n### NiN\u5757\r\n\r\n\u4e00\u4e2a\u5377\u79ef\u5c42\u540e\u8ddf\u4e24\u4e2a1 x 1\u5377\u79ef\u5c42\uff0c\u6b65\u5e451\uff0c\u65e0\u586b\u5145\uff0c\u8f93\u51fa\u5f62\u72b6\u4e0e\u5377\u79ef\u5c42\u8f93\u51fa\u4e00\u81f4\uff0c\u8d77\u5230\u5168\u8fde\u63a5\u5c42\u7684\u4f5c\u7528\r\n\r\n### NiN\u67b6\u6784\r\n\r\n\u65e0\u5168\u8fde\u63a5\u5c42\r\n\r\n\u4ea4\u66ff\u4f7f\u7528NiN\u5757\u548c\u6b65\u5e45\u4e3a2\u7684\u6700\u5927\u6c60\u5316\u5c42\uff0c\u6700\u540e\u7528\u5168\u5c40\u5e73\u5747\u6c60\u5316\u5c42\u5f97\u5230\u8f93\u51fa\r\n\r\n```python\r\nimport torch\r\nfrom torch import nn\r\n\r\ndef nin_block(in_channels, out_channels, kernel_size, strides, padding):\r\n    return nn.Sequential(\r\n        nn.Conv2d(in_channels, out_channels, kernel_size, strides, padding),\r\n        nn.ReLU(),\r\n        nn.Conv2d(out_channels, out_channels, kernel_size=1), nn.ReLU(),\r\n        nn.Conv2d(out_channels, out_channels, kernel_size=1), nn.ReLU())\r\n    \r\nnet = nn.Sequential(\r\n    nin_block(1, 96, kernel_size=11, strides=4, padding=0),\r\n    nn.MaxPool2d(3, stride=2),\r\n    nin_block(96, 256, kernel_size=5, strides=1, padding=2),\r\n    nn.MaxPool2d(3, stride=2),\r\n    nin_block(256, 384, kernel_size=3, strides=1, padding=1),\r\n    nn.MaxPool2d(3, stride=2),\r\n    nn.Dropout(0.5),\r\n    # \u6807\u7b7e\u7c7b\u522b\u6570\u662f10\r\n    nin_block(384, 10, kernel_size=3, strides=1, padding=1),\r\n    nn.AdaptiveAvgPool2d((1, 1)),\r\n    # \u5c06\u56db\u7ef4\u7684\u8f93\u51fa\u8f6c\u6210\u4e8c\u7ef4\u7684\u8f93\u51fa\uff0c\u5176\u5f62\u72b6\u4e3a(\u6279\u91cf\u5927\u5c0f,10)\r\n    nn.Flatten())\r\n```\r\n\r\n## GoogLeNet\r\n\r\n### Inception\u5757\r\n\r\n4\u4e2a\u8def\u5f84\u4ece\u4e0d\u540c\u5c42\u9762\u62bd\u53d6\u4fe1\u606f\uff0c\u7136\u540e\u5728\u8f93\u51fa\u901a\u9053\u5408\u5e76\r\n\r\n\u8ddf\u53553 x 3\u548c5 x 5\u5377\u79ef\u5c42\uff0cInception\u5757\u6709\u66f4\u5c11\u7684\u53c2\u6570\u4e2a\u6570\u548c\u8ba1\u7b97\u590d\u6742\u5ea6\r\n\r\n### \u67b6\u6784\r\n\r\n5\u6bb5\uff0c9\u4e2aInception\u5757\r\n\r\n```python\r\nimport torch\r\nfrom torch import nn\r\nfrom torch.nn import functional as F\r\n\r\nclass Inception(nn.Module):\r\n    # c1--c4\u662f\u6bcf\u6761\u8def\u5f84\u7684\u8f93\u51fa\u901a\u9053\u6570\r\n    def __init__(self, in_channels, c1, c2, c3, c4, **kwargs):\r\n        super(Inception, self).__init__(**kwargs)\r\n        # \u7ebf\u8def1\uff0c\u53551x1\u5377\u79ef\u5c42\r\n        self.p1_1 = nn.Conv2d(in_channels, c1, kernel_size=1)\r\n        # \u7ebf\u8def2\uff0c1x1\u5377\u79ef\u5c42\u540e\u63a53x3\u5377\u79ef\u5c42\r\n        self.p2_1 = nn.Conv2d(in_channels, c2[0], kernel_size=1)\r\n        self.p2_2 = nn.Conv2d(c2[0], c2[1], kernel_size=3, padding=1)\r\n        # \u7ebf\u8def3\uff0c1x1\u5377\u79ef\u5c42\u540e\u63a55x5\u5377\u79ef\u5c42\r\n        self.p3_1 = nn.Conv2d(in_channels, c3[0], kernel_size=1)\r\n        self.p3_2 = nn.Conv2d(c3[0], c3[1], kernel_size=5, padding=2)\r\n        # \u7ebf\u8def4\uff0c3x3\u6700\u5927\u6c47\u805a\u5c42\u540e\u63a51x1\u5377\u79ef\u5c42\r\n        self.p4_1 = nn.MaxPool2d(kernel_size=3, stride=1, padding=1)\r\n        self.p4_2 = nn.Conv2d(in_channels, c4, kernel_size=1)\r\n\r\n    def forward(self, x):\r\n        p1 = F.relu(self.p1_1(x))\r\n        p2 = F.relu(self.p2_2(F.relu(self.p2_1(x))))\r\n        p3 = F.relu(self.p3_2(F.relu(self.p3_1(x))))\r\n        p4 = F.relu(self.p4_2(self.p4_1(x)))\r\n        # \u5728\u901a\u9053\u7ef4\u5ea6\u4e0a\u8fde\u7ed3\u8f93\u51fa\r\n        return torch.cat((p1, p2, p3, p4), dim=1)\r\n    \r\nb1 = nn.Sequential(nn.Conv2d(1, 64, kernel_size=7, stride=2, padding=3),\r\n                   nn.ReLU(),\r\n                   nn.MaxPool2d(kernel_size=3, stride=2, padding=1))\r\n\r\nb2 = nn.Sequential(nn.Conv2d(64, 64, kernel_size=1),\r\n                   nn.ReLU(),\r\n                   nn.Conv2d(64, 192, kernel_size=3, padding=1),\r\n                   nn.ReLU(),\r\n                   nn.MaxPool2d(kernel_size=3, stride=2, padding=1))\r\n\r\nb3 = nn.Sequential(Inception(192, 64, (96, 128), (16, 32), 32),\r\n                   Inception(256, 128, (128, 192), (32, 96), 64),\r\n                   nn.MaxPool2d(kernel_size=3, stride=2, padding=1))\r\n\r\nb4 = nn.Sequential(Inception(480, 192, (96, 208), (16, 48), 64),\r\n                   Inception(512, 160, (112, 224), (24, 64), 64),\r\n                   Inception(512, 128, (128, 256), (24, 64), 64),\r\n                   Inception(512, 112, (144, 288), (32, 64), 64),\r\n                   Inception(528, 256, (160, 320), (32, 128), 128),\r\n                   nn.MaxPool2d(kernel_size=3, stride=2, padding=1))\r\n\r\nb5 = nn.Sequential(Inception(832, 256, (160, 320), (32, 128), 128),\r\n                   Inception(832, 384, (192, 384), (48, 128), 128),\r\n                   nn.AdaptiveAvgPool2d((1,1)),\r\n                   nn.Flatten())\r\n\r\nnet = nn.Sequential(b1, b2, b3, b4, b5, nn.Linear(1024, 10))\r\n```\r\n\r\n## \u6279\u91cf\u5f52\u4e00\u5316\r\n\r\n\u635f\u5931\u51fa\u73b0\u5728\u6700\u540e\uff0c\u540e\u9762\u7684\u5c42\u8bad\u7ec3\u8f83\u5feb\r\n\r\n\u6570\u636e\u5728\u6700\u5e95\u90e8\uff0c\u5e95\u90e8\u7684\u5c42\u8bad\u7ec3\u8f83\u6162\uff0c\u5e95\u90e8\u5c42\u4e00\u53d8\u6240\u6709\u90fd\u5f97\u8ddf\u7740\u53d8\uff0c\u6700\u540e\u7684\u5c42\u591a\u6b21\u5b66\u4e60\uff0c\u5bfc\u81f4\u6536\u655b\u53d8\u6162\r\n\r\n\u56fa\u5b9a\u5c0f\u6279\u91cf\u91cc\u9762\u7684\u5747\u503c\u548c\u65b9\u5dee\r\n$$\r\n\\mu_B = \\frac{1}{|B|} \\sum_{i \\in B}x_i, \\sigma_B^2 = \\frac{1}{|B|} \\sum_{i \\in B}(x_i - \\mu_B)^2 + \\epsilon\r\n$$\r\n\u7136\u540e\u505a\u989d\u5916\u7684\u8c03\u6574\r\n$$\r\nx_{i + 1} = \\gamma \\frac{x_i - \\mu_B}{\\sigma_B}+\\beta\r\n$$\r\n\u53ef\u5b66\u4e60\u53c2\u6570\u4e3a$\\gamma, \\beta$\r\n\r\n\u4f5c\u7528\u5728\u5168\u8fde\u63a5\u5c42\u548c\u5377\u79ef\u8f93\u51fa\u4e0a\uff0c\u6fc0\u6d3b\u51fd\u6570\u524d\uff0c\u4ee5\u53ca\u5168\u8fde\u63a5\u5c42\u548c\u5377\u79ef\u5c42\u8f93\u5165\u4e0a\r\n\r\n\u5bf9\u4e8e\u5168\u8fde\u63a5\u5c42\uff0c\u4f5c\u7528\u5728\u7279\u5f81\u7ef4\r\n\r\n\u5bf9\u4e8e\u5377\u79ef\u5c42\uff0c\u4f5c\u7528\u5728\u901a\u9053\u7ef4\r\n\r\n\u6700\u521d\u8bba\u6587\u662f\u60f3\u7528\u5176\u51cf\u5c11\u5185\u90e8\u534f\u53d8\u91cf\u8f6c\u79fb\uff0c\u540e\u7eed\u6709\u8bba\u6587\u6307\u51fa\u5b83\u53ef\u80fd\u5c31\u662f\u901a\u8fc7\u5728\u6bcf\u4e2a\u5c0f\u6279\u91cf\u91cc\u52a0\u5165\u566a\u97f3\u6765\u63a7\u5236\u6a21\u578b\u590d\u6742\u5ea6\r\n\r\n\u56e0\u6b64\u6ca1\u5fc5\u8981\u548c\u4e22\u5f03\u6cd5\u6df7\u5408\u4f7f\u7528\r\n\r\n```python\r\nimport torch\r\nfrom torch import nn\r\n\r\ndef batch_norm(X, gamma, beta, moving_mean, moving_var, eps, momentum):\r\n    # \u901a\u8fc7is_grad_enabled\u6765\u5224\u65ad\u5f53\u524d\u6a21\u5f0f\u662f\u8bad\u7ec3\u6a21\u5f0f\u8fd8\u662f\u9884\u6d4b\u6a21\u5f0f\r\n    if not torch.is_grad_enabled():\r\n        # \u5982\u679c\u662f\u5728\u9884\u6d4b\u6a21\u5f0f\u4e0b\uff0c\u76f4\u63a5\u4f7f\u7528\u4f20\u5165\u7684\u79fb\u52a8\u5e73\u5747\u6240\u5f97\u7684\u5747\u503c\u548c\u65b9\u5dee\r\n        X_hat = (X - moving_mean) / torch.sqrt(moving_var + eps)\r\n    else:\r\n        assert len(X.shape) in (2, 4)\r\n        if len(X.shape) == 2:\r\n            # \u4f7f\u7528\u5168\u8fde\u63a5\u5c42\u7684\u60c5\u51b5\uff0c\u8ba1\u7b97\u7279\u5f81\u7ef4\u4e0a\u7684\u5747\u503c\u548c\u65b9\u5dee\r\n            mean = X.mean(dim=0)\r\n            var = ((X - mean) ** 2).mean(dim=0)\r\n        else:\r\n            # \u4f7f\u7528\u4e8c\u7ef4\u5377\u79ef\u5c42\u7684\u60c5\u51b5\uff0c\u8ba1\u7b97\u901a\u9053\u7ef4\u4e0a\uff08axis=1\uff09\u7684\u5747\u503c\u548c\u65b9\u5dee\u3002\r\n            # \u8fd9\u91cc\u6211\u4eec\u9700\u8981\u4fdd\u6301X\u7684\u5f62\u72b6\u4ee5\u4fbf\u540e\u9762\u53ef\u4ee5\u505a\u5e7f\u64ad\u8fd0\u7b97\r\n            mean = X.mean(dim=(0, 2, 3), keepdim=True)\r\n            var = ((X - mean) ** 2).mean(dim=(0, 2, 3), keepdim=True)\r\n        # \u8bad\u7ec3\u6a21\u5f0f\u4e0b\uff0c\u7528\u5f53\u524d\u7684\u5747\u503c\u548c\u65b9\u5dee\u505a\u6807\u51c6\u5316\r\n        X_hat = (X - mean) / torch.sqrt(var + eps)\r\n        # \u66f4\u65b0\u79fb\u52a8\u5e73\u5747\u7684\u5747\u503c\u548c\u65b9\u5dee\r\n        moving_mean = momentum * moving_mean + (1.0 - momentum) * mean\r\n        moving_var = momentum * moving_var + (1.0 - momentum) * var\r\n    Y = gamma * X_hat + beta  # \u7f29\u653e\u548c\u79fb\u4f4d\r\n    return Y, moving_mean.data, moving_var.data\r\n\r\nclass BatchNorm(nn.Module):\r\n    # num_features\uff1a\u5b8c\u5168\u8fde\u63a5\u5c42\u7684\u8f93\u51fa\u6570\u91cf\u6216\u5377\u79ef\u5c42\u7684\u8f93\u51fa\u901a\u9053\u6570\u3002\r\n    # num_dims\uff1a2\u8868\u793a\u5b8c\u5168\u8fde\u63a5\u5c42\uff0c4\u8868\u793a\u5377\u79ef\u5c42\r\n    def __init__(self, num_features, num_dims):\r\n        super().__init__()\r\n        if num_dims == 2:\r\n            shape = (1, num_features)\r\n        else:\r\n            shape = (1, num_features, 1, 1)\r\n        # \u53c2\u4e0e\u6c42\u68af\u5ea6\u548c\u8fed\u4ee3\u7684\u62c9\u4f38\u548c\u504f\u79fb\u53c2\u6570\uff0c\u5206\u522b\u521d\u59cb\u5316\u62101\u548c0\r\n        self.gamma = nn.Parameter(torch.ones(shape))\r\n        self.beta = nn.Parameter(torch.zeros(shape))\r\n        # \u975e\u6a21\u578b\u53c2\u6570\u7684\u53d8\u91cf\u521d\u59cb\u5316\u4e3a0\u548c1\r\n        self.moving_mean = torch.zeros(shape)\r\n        self.moving_var = torch.ones(shape)\r\n\r\n    def forward(self, X):\r\n        # \u5982\u679cX\u4e0d\u5728\u5185\u5b58\u4e0a\uff0c\u5c06moving_mean\u548cmoving_var\r\n        # \u590d\u5236\u5230X\u6240\u5728\u663e\u5b58\u4e0a\r\n        if self.moving_mean.device != X.device:\r\n            self.moving_mean = self.moving_mean.to(X.device)\r\n            self.moving_var = self.moving_var.to(X.device)\r\n        # \u4fdd\u5b58\u66f4\u65b0\u8fc7\u7684moving_mean\u548cmoving_var\r\n        Y, self.moving_mean, self.moving_var = batch_norm(\r\n            X, self.gamma, self.beta, self.moving_mean,\r\n            self.moving_var, eps=1e-5, momentum=0.9)\r\n        return Y\r\n\r\n# \u4f7f\u7528BatchNorm\u7684LeNet\r\nnet = nn.Sequential(\r\n    nn.Conv2d(1, 6, kernel_size=5), BatchNorm(6, num_dims=4), nn.Sigmoid(),\r\n    nn.AvgPool2d(kernel_size=2, stride=2),\r\n    nn.Conv2d(6, 16, kernel_size=5), BatchNorm(16, num_dims=4), nn.Sigmoid(),\r\n    nn.AvgPool2d(kernel_size=2, stride=2), nn.Flatten(),\r\n    nn.Linear(16*4*4, 120), BatchNorm(120, num_dims=2), nn.Sigmoid(),\r\n    nn.Linear(120, 84), BatchNorm(84, num_dims=2), nn.Sigmoid(),\r\n    nn.Linear(84, 10))\r\n\r\n# \u4f7f\u7528torch.nn.BatchNorm2d\u4e0etorch.nn.BatchNorm1d\r\nnet = nn.Sequential(\r\n    nn.Conv2d(1, 6, kernel_size=5), nn.BatchNorm2d(6), nn.Sigmoid(),\r\n    nn.AvgPool2d(kernel_size=2, stride=2),\r\n    nn.Conv2d(6, 16, kernel_size=5), nn.BatchNorm2d(16), nn.Sigmoid(),\r\n    nn.AvgPool2d(kernel_size=2, stride=2), nn.Flatten(),\r\n    nn.Linear(256, 120), nn.BatchNorm1d(120), nn.Sigmoid(),\r\n    nn.Linear(120, 84), nn.BatchNorm1d(84), nn.Sigmoid(),\r\n    nn.Linear(84, 10))\r\n```\r\n\r\n## ResNet\r\n\r\n### ResNet\u5757\r\n\r\n\u4e32\u8054\u4e00\u4e2a\u5c42\u6539\u53d8\u51fd\u6570\u7c7b\uff0c\u6211\u4eec\u5e0c\u671b\u80fd\u6269\u5927\u51fd\u6570\u7c7b\r\n\r\n\u6b8b\u5dee\u5757\u52a0\u5165\u5feb\u901f\u901a\u9053\u6765\u5f97\u5230$f(x) = x + g(x)$\u7684\u7ed3\u6784\r\n\r\n### ResNet\u67b6\u6784\r\n\r\n\u9ad8\u5bbd\u51cf\u534a\u7684ResNet\u5757\uff0c\u540e\u63a5\u591a\u4e2a\u9ad8\u5bbd\u4e0d\u53d8\u7684ResNet\u5757\r\n\r\n\u7c7b\u4f3cVGG\u548cGoogLeNet\u7684\u603b\u67b6\u6784\uff0c\u4f46\u662f\u66ff\u6362\u6210\u4e86ResNet\u5757\r\n\r\n```python\r\nimport torch\r\nfrom torch import nn\r\nfrom torch.nn import functional as F\r\n\r\nclass Residual(nn.Module):\r\n    def __init__(self, input_channels, num_channels,\r\n                 use_1x1conv=False, strides=1):\r\n        super().__init__()\r\n        self.conv1 = nn.Conv2d(input_channels, num_channels,\r\n                               kernel_size=3, padding=1, stride=strides)\r\n        self.conv2 = nn.Conv2d(num_channels, num_channels,\r\n                               kernel_size=3, padding=1)\r\n        if use_1x1conv:\r\n            self.conv3 = nn.Conv2d(input_channels, num_channels,\r\n                                   kernel_size=1, stride=strides)\r\n        else:\r\n            self.conv3 = None\r\n        self.bn1 = nn.BatchNorm2d(num_channels)\r\n        self.bn2 = nn.BatchNorm2d(num_channels)\r\n\r\n    def forward(self, X):\r\n        Y = F.relu(self.bn1(self.conv1(X)))\r\n        Y = self.bn2(self.conv2(Y))\r\n        if self.conv3:\r\n            X = self.conv3(X)\r\n        Y += X\r\n        return F.relu(Y)\r\n    \r\nb1 = nn.Sequential(nn.Conv2d(1, 64, kernel_size=7, stride=2, padding=3),\r\n                   nn.BatchNorm2d(64), nn.ReLU(),\r\n                   nn.MaxPool2d(kernel_size=3, stride=2, padding=1))\r\n\r\ndef resnet_block(input_channels, num_channels, num_residuals,\r\n                 first_block=False):\r\n    blk = []\r\n    for i in range(num_residuals):\r\n        if i == 0 and not first_block:\r\n            blk.append(Residual(input_channels, num_channels,\r\n                                use_1x1conv=True, strides=2))\r\n        else:\r\n            blk.append(Residual(num_channels, num_channels))\r\n    return blk\r\n\r\nb2 = nn.Sequential(*resnet_block(64, 64, 2, first_block=True))\r\nb3 = nn.Sequential(*resnet_block(64, 128, 2))\r\nb4 = nn.Sequential(*resnet_block(128, 256, 2))\r\nb5 = nn.Sequential(*resnet_block(256, 512, 2))\r\n\r\nnet = nn.Sequential(b1, b2, b3, b4, b5,\r\n                    nn.AdaptiveAvgPool2d((1,1)),\r\n                    nn.Flatten(), nn.Linear(512, 10))\r\n```"</script>
