<div class="card mb-3 shadow">

        <script id="markdown-source" type="application/json">"## BFS\r\n\r\n\u4ece\u521d\u6001S\uff0c\u5229\u7528\u89c4\u5219\u751f\u6210\u6240\u6709\u53ef\u80fd\u7684\u72b6\u6001\uff0c\u6784\u6210\u4e0b\u4e00\u5c42\u8282\u70b9\uff0c\u68c0\u67e5\u662f\u5426\u51fa\u73b0\u76ee\u6807\u72b6\u6001G\r\n\r\n\u82e5\u672a\u51fa\u73b0\uff0c\u5bf9\u8be5\u5c42\u518d\u6b21\u751f\u6210\u3001\u68c0\u67e5\uff0c\u76f4\u5230\u51fa\u73b0\u76ee\u6807\u8282\u70b9\r\n\r\n1. \u5c06\u521d\u59cb\u8282\u70b9\u6dfb\u52a0\u5230\u961f\u5217Q\r\n\r\n2. if Q\u7684\u7b2c\u4e00\u4e2a\u8282\u70b9q\u662f\u76ee\u6807\u8282\u70b9\uff0cThen \u505c\u6b62\r\n\r\n3. \u4eceQ\u4e2d\u5220\u9664q\uff0c\u628aq\u7684\u5c1a\u672a\u8bbf\u95ee\u7684\u5b50\u8282\u70b9\u52a0\u5165Q\u7684\u672b\u5c3e\r\n\r\n4. if Q\u4e3a\u7a7a Then \u5931\u8d25\uff0cElse goto \u6b65\u9aa42\r\n\r\n[\u4f8b\u9898\uff1aPOJ3984](https://vjudge.net/contest/701114#problem/A)\r\n\r\n```cpp\r\n#include\u003Ccstdio\u003E\r\n#include\u003Cqueue\u003E\r\nusing namespace std;\r\n\r\nint mp[5][5], vis[5][5];\r\nint dir[4][2] = {{1, 0}, {-1, 0}, {0, 1}, {0, -1}};\r\nstruct node{\r\n    int x, y;\r\n}; \r\nnode pre[10][10];\r\n\r\nvoid bfs(){\r\n    queue\u003Cnode\u003E que;\r\n    node str;\r\n    str.x = str.y = 0;\r\n    que.push(str);\r\n    vis[0][0] = 1;\r\n    while (!que.empty()){\r\n        node now = que.front();\r\n        que.pop();\r\n        if (now.x == 4 \u0026\u0026 now.y == 4) return;\r\n        for (int i = 0; i \u003C 4; i++){\r\n            node next ;\r\n            next.x = now.x + dir[i][0];\r\n            next.y = now.y + dir[i][1];\r\n            if (next.x \u003E= 0 \u0026\u0026 next.x \u003C 5 \u0026\u0026\r\n                next.y \u003E= 0 \u0026\u0026 next.y \u003C 5 \u0026\u0026\r\n                !mp[next.x][next.y] \u0026\u0026 !vis[next.x][next.y]){\r\n                vis[next.x][next.y] = 1;\r\n                que.push(next);\r\n                pre[next.x][next.y] = now;\r\n            }\r\n        }\r\n    } \r\n}\r\n\r\nvoid print(node cur){\r\n    if (cur.x == 0 \u0026\u0026 cur.y == 0){\r\n        printf(\"(0, 0)\\n\");\r\n        return;\r\n    }\r\n    print(pre[cur.x][cur.y]);\r\n    printf(\"(%d, %d)\\n\", cur.x, cur.y);\r\n}\r\n\r\nint main(){\r\n    for (int i = 0; i \u003C 5; i++) for (int j = 0; j \u003C 5; j++) scanf(\"%d\", \u0026mp[i][j]);\r\n    bfs();\r\n    node ed;\r\n    ed.x = ed.y = 4;\r\n    print(ed);\r\n    return 0;\r\n}\r\n```\r\n\r\n\r\n\r\n[\u4f8b\u9898\uff1aPOJ1915](https://vjudge.net/contest/701114#problem/B)\r\n\r\n```cpp\r\n#include\u003Ccstdio\u003E\r\n#include\u003Cqueue\u003E\r\n#include\u003Cstring.h\u003E\r\nusing namespace std;\r\n\r\nint length, sx, dx, sy, dy;\r\nstruct node{\r\n    int x, y, step;\r\n}; \r\nint visit[310][310];\r\nint po[8][2] = {2, 1, 2, -1, 1, 2, 1, -2, -2, 1, -2, -1, -1, 2, -1, -2};\r\n\r\nint check(int x, int y){\r\n    if (x \u003C 0 || x \u003E= length || y \u003C 0 || y \u003E= length) return 1;\r\n    return visit[x][y];\r\n}\r\n\r\nvoid bfs(){\r\n    memset(visit, 0, sizeof(visit));\r\n    node a, b;\r\n    queue\u003Cnode\u003E Q;\r\n    a.x = sx;\r\n    a.y = sy;\r\n    a.step = 0;\r\n    visit[sx][sy] = 1;\r\n    Q.push(a);\r\n    while (!Q.empty()){\r\n        a = Q.front();\r\n        Q.pop();\r\n        if (a.x == dx \u0026\u0026 a.y == dy){\r\n            printf(\"%d\\n\", a.step);\r\n            return;\r\n        }\r\n        for (int i = 0; i \u003C 8; i++){\r\n            b.x = a.x + po[i][0];\r\n            b.y = a.y + po[i][1];\r\n            if (check(b.x, b.y)) continue;\r\n            b.step = a.step + 1;\r\n            visit[b.x][b.y] = 1;\r\n            Q.push(b);\r\n        }\r\n    } \r\n}\r\n\r\nint main(){\r\n    int T;\r\n    scanf(\"%d\", \u0026T);\r\n    while (T--){\r\n        scanf(\"%d\", \u0026length);\r\n        scanf(\"%d%d%d%d\", \u0026sx, \u0026sy, \u0026dx, \u0026dy);\r\n        bfs();\r\n    }\r\n    return 0;\r\n}\r\n```\r\n\r\n## DFS\r\n\r\n\u5bf9\u6bcf\u4e00\u4e2a\u53ef\u80fd\u7684\u5206\u652f\u6df1\u5165\u5230\u4e0d\u80fd\u518d\u8f6c\u79fb\u4e3a\u6b62\uff0c\u7136\u540e\u56de\u6eaf\u5230\u524d\u4e00\u6b65\u7684\u72b6\u6001\uff0c\u7ee7\u7eed\u8f6c\u79fb\u5230\u524d\u4e00\u6b65\u7684\u72b6\u6001\uff0c\u76f4\u5230\u627e\u5230\u6700\u7ec8\u7684\u89e3\r\n\r\n1. \u628a\u8d77\u59cb\u70b9\u653e\u5165stack \r\n2. \u91cd\u590d\u4e0b\u8ff03\u6b65\u9aa4\uff0c\u76f4\u5230stack\u4e3a\u7a7a\u4e3a\u6b62\uff1a\r\n   - \u4ecestack\u4e2d\u8bbf\u95ee\u6808\u9876\u7684\u70b9\r\n   - \u627e\u51fa\u4e0e\u6b64\u70b9\u90bb\u63a5\u7684\u4e14\u5c1a\u672a\u904d\u5386\u7684\u70b9\uff0c\u8fdb\u884c\u6807\u8bb0\uff0c\u7136\u540e\u5168\u90e8\u653e\u5165stack\u4e2d\r\n   - \u5982\u679c\u6b64\u70b9\u6ca1\u6709\u5c1a\u672a\u904d\u5386\u7684\u90bb\u63a5\u70b9\uff0c\u5219\u5c06\u6b64\u70b9\u4ecestack\u4e2d\u5f39\u51fa\u3002\r\n\r\n[\u4f8b\u9898\uff1aPOJ2386](https://vjudge.net/contest/701114#problem/C)\r\n\r\n```cpp\r\n#include\u003Ciostream\u003E\r\nusing namespace std;\r\n\r\nint N, M;\r\nconst int  MAX_N = 103;\r\nchar field[MAX_N][MAX_N];\r\n\r\nvoid dfs(int x, int y){\r\n    field[x][y] = '.';\r\n    for (int dx = -1; dx \u003C= 1; dx++){\r\n        for (int dy = -1; dy \u003C= 1; dy++){\r\n            int nx = x + dx, ny = y + dy;\r\n            if (0 \u003C= nx \u0026\u0026 nx \u003C N \u0026\u0026 0 \u003C= ny \u0026\u0026 ny \u003C M \u0026\u0026 field[nx][ny] == 'W') dfs(nx, ny);\r\n        } \r\n    }\r\n    return;\r\n}\r\n\r\nvoid solve(){\r\n    int res = 0;\r\n    for (int i = 0; i \u003C N; i++){\r\n        for (int j = 0; j \u003C M; j++){\r\n            if (field[i][j] == 'W'){\r\n                dfs(i, j);\r\n                res++;\r\n            }\r\n        }\r\n    }\r\n    cout \u003C\u003C res;\r\n}\r\n\r\nint main(){\r\n    cin \u003E\u003E N \u003E\u003E M;\r\n    for (int i = 0; i \u003C N; i++) for (int j = 0; j \u003C M; j++) cin \u003E\u003E field[i][j];\r\n    solve();\r\n} \r\n```\r\n\r\n[\u4f8b\u9898\uff1aPOJ2488](https://vjudge.net/contest/701114#problem/D)\r\n\r\n```cpp\r\n#include\u003Ciostream\u003E\r\n#include\u003Ccstdio\u003E\r\n#include\u003Ccstring\u003E\r\nusing namespace std;\r\n\r\nconst int DN = 8;\r\nconst int dx[] = {-1, 1, -2, 2, -2, 2, -1, 1};\r\nconst int dy[] = {-2, -2, -1, -1, 1, 1, 2, 2};\r\nconst int N = 27;\r\nbool visit[N][N];\r\nstruct Step{\r\n    char x, y;\r\n} path[N];\r\nint p, q, success;\r\n\r\nvoid dfs(int x, int y, int step){\r\n    path[step].y = y + 'A' - 1;\r\n    path[step].x = x + '0';\r\n    if (step == p * q) success = true;\r\n    else {\r\n        for (int i = 0; i \u003C DN \u0026\u0026 !success; i++){\r\n            int nx = x + dx[i];\r\n            int ny = y + dy[i];\r\n            if (0 \u003C nx \u0026\u0026 nx \u003C= p \u0026\u0026 0 \u003C ny \u0026\u0026 ny \u003C= q \u0026\u0026 !visit[nx][ny] \u0026\u0026 !success){\r\n                visit[nx][ny] = true;\r\n                dfs(nx, ny, step + 1);\r\n                visit[nx][ny] = false;\r\n            }\r\n        }\r\n    }\r\n}\r\n\r\nint main(){\r\n    int t;\r\n    scanf(\"%d\", \u0026t);\r\n    for (int k = 1; k \u003C= t; k++){\r\n        scanf(\"%d%d\", \u0026p, \u0026q);\r\n        memset(visit, false, sizeof(visit));\r\n        visit[1][1] = true;\r\n        success = false;\r\n        dfs(1, 1, 1);\r\n        printf(\"Scenario #%d:\\n\", k);\r\n        if (success){\r\n            for (int i = 1; i \u003C= p * q; i++) printf(\"%c%c\", path[i].y, path[i].x);\r\n            printf(\"\\n\");\r\n        } else printf(\"impossible\\n\");\r\n        if (k != t) printf(\"\\n\");\r\n    }\r\n    return 0;\r\n}\r\n```"</script>
