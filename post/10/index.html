<div class="card mb-3 shadow">
    <div class="card-body">
        <script id="markdown-source" type="application/json">"## DP\r\n\r\n\u5c06\u5927\u95ee\u9898\u5206\u4e3a\u5c0f\u95ee\u9898\u8fdb\u884c\u89e3\u51b3\uff0c\u4ece\u800c\u4e00\u6b65\u6b65\u83b7\u53d6\u6700\u4f18\u89e3\r\n\r\n- \u523b\u753b\u4e00\u4e2a\u6700\u4f18\u89e3\u7684\u7279\u5f81\u7ed3\u6784\r\n- \u9012\u5f52\u5b9a\u4e49\u6700\u4f18\u89e3\u7684\u503c\r\n- \u8ba1\u7b97\u6700\u4f18\u89e3\u7684\u503c\uff0c\u901a\u5e38\u91c7\u7528\u81ea\u5e95\u800c\u4e0a\u7684\u65b9\u6cd5\r\n- \u5229\u7528\u8ba1\u7b97\u51fa\u7684\u4fe1\u606f\u6784\u9020\u4e00\u4e2a\u6700\u4f18\u89e3\r\n\r\n\u6570\u5b57\u4e09\u89d2\u5f62\u641c\u7d22\u6811\r\n\r\n- \u5b9a\u4e49\u72b6\u6001$(i, j)$\u7684\u51fd\u6570$f(x, y)$\u4e3a\u4ece\u683c\u5b50$(i, j)$\u51fa\u53d1\u65f6\u80fd\u5f97\u5230\u7684\u6700\u5927\u548c\uff0c\u5305\u62ec$(i, j)$\u672c\u8eab\r\n- \u539f\u95ee\u9898\u7684\u89e3\u662f$(i, j)$\r\n- \u72b6\u6001\u8f6c\u79fb\u65b9\u7a0b\uff1a$f(i, j) = a(i, j) +max(f(i + 1, j), f(i + 1, j + 1))$\r\n\r\n```cpp\r\nint i, j;\r\nfor (j = 1; j \u003C=n; j++) f[n][j] = a[n][j];\r\nfor (i = n - 1; i \u003E= 1; i--) for (j = 1; j \u003C= i; j ++) f[i][j] = a[i][j] + max(f[i + 1][j], f[i + 1][j + 1])\r\n```\r\n\r\n[\u4f8b\u9898\uff1aPOJ3176](https://vjudge.net/contest/703263#problem/A)\r\n\r\n```cpp\r\n#include\u003Ciostream\u003E\r\n#include\u003Ccstdio\u003E\r\n#define MAXN 351\r\nusing namespace std;\r\nint way[MAXN][MAXN], dp[MAXN][MAXN];\r\nint N;\r\n\r\nint main(){\r\n    cin \u003E\u003E N;\r\n    for (int i = 1; i \u003C= N; i++) for (int j = 1; j \u003C= i; j++) cin \u003E\u003E way[i][j];\r\n    for (int j = 1; j \u003C= N; j++) dp[N][j] = way[N][j];\r\n    for (int i = N - 1; i \u003E= 1; i--) {\r\n        for (int j = 1; j \u003C= i; j ++) dp[i][j] = way[i][j] + max(dp[i + 1][j], dp[i + 1][j + 1]);\r\n    }\r\n    cout \u003C\u003C dp[1][1] \u003C\u003C endl;\r\n    return 0;\r\n}\r\n```\r\n\r\n## 01\u80cc\u5305\r\n\r\nn\u4e2a\u91cd\u91cf\u4ef7\u503c\u4e3a$w_i, v_i$\u7684\u7269\u54c1\uff0c\u9009\u51fa\u603b\u91cd\u91cf\u4e0d\u8d85\u8fc7W\u7684\u7269\u54c1\uff0c\u6c42\u4ef7\u503c\u603b\u548c\u6700\u5927\u503c\r\n\r\n\u72b6\u6001\u8f6c\u79fb\u65b9\u7a0b\uff08\u6b63\u63a8\uff09\uff1a\r\n$$\r\ndp[i][j] = \r\n\\begin{cases}\r\n\t0, i = n;\\cr\r\n\tdp[i + 1][j], i \u003C w[i];\\cr\r\n\tmax(dp[i + 1][j], dp[i + 1][j - w[i]] + v[i]), else;\r\n\\end{cases}\r\n$$\r\n\r\n\r\n\u72b6\u6001\u8f6c\u79fb\u65b9\u7a0b\uff08\u6b63\u63a8\uff09\uff1a\r\n$$\r\ndp[i + 1][j] = \r\n\\begin{cases}\r\n\t0, i = 0;\\cr\r\n\tdp[i][j], i \u003C w[i];\\cr\r\n\tmax(dp[i][j], dp[i][j - w[i]] + v[i]), else;\r\n\\end{cases}\r\n$$\r\n\r\n```cpp\r\nint n, w;\r\nint w[MAX_N], v[MAX_N];\r\nint mem[MAX_N + 1][MAX_W + 1], dp[MAX_N + 1][MAX_W + 1], dp1[MAX_W + 1];\r\n\r\n//\u66b4\u641c\r\nint rec(int i, int j){\r\n    if (i == n) return 0;\r\n    else if (j \u003C w[i]) return rec(i + 1, j);\r\n    else return max(rec(i + 1, j), rec(i + 1, j - w[i]) + v[i]);\r\n}\r\n\r\n//\u8bb0\u5fc6\u5316\u641c\u7d22\r\nint rec_mem(int i, int j){\r\n    if (mem[i][j] \u003E= 0) return mem[i][j]\r\n    if (i == n) return 0;\r\n    else if (j \u003C w[i]) return rec(i + 1, j);\r\n    else return max(rec(i + 1, j), rec(i + 1, j - w[i]) + v[i]);\r\n}\r\n\r\nvoid solve(){\r\n    memset(mem, -1, sizeof(mem));\r\n    printf(\"%d\\n\", rec(0, w));\r\n    printf(\"%d\\n\", rec_mem(0, w));\r\n    //dp\u53cd\u63a8\r\n    for (int i = n - 1; i \u003E= 0; i--){\r\n        for (int j = 0; j \u003C W; j++){\r\n            if (j \u003C w[i]) dp[i][j] = dp[i + 1][j];\r\n            else dp[i][j] = max(dp[i + 1][j], dp[i + 1][j - w[i]] + v[i]);\r\n        }\r\n    }\r\n    printf(\"%d\\n\", dp[n][W]);\r\n    \r\n    memset(dp, 0, sizeof(dp));\r\n    //dp\u6b63\u63a8\r\n    for (int i = 0; i \u003C n; i++){\r\n        for (int j = 0; j \u003C W; j++){\r\n            if (j \u003C w[i]) dp[i + 1][j] = dp[i][j];\r\n            else dp[i + 1][j] = max(dp[i][j], dp[i][j - w[i]] + v[i]);\r\n        }\r\n    }\r\n    printf(\"%d\\n\", dp[n][W]);\r\n    //\u4e00\u7ef4dp\r\n    for (int i = 0; i \u003C n; i) for (int j = W; j \u003E= w[i]; j--) dp1[j] = max(dp1[j], dp1[j - w[i]] + v[i]);\r\n    printf(\"%d\\n\", dp[W]);\r\n}\r\n```\r\n\r\n[\u4f8b\u9898\uff1aPOJ3624](https://vjudge.net/contest/703263#problem/B)\r\n\r\n```cpp\r\n#include\u003Ciostream\u003E\r\n#include\u003Ccstring\u003E\r\n#include\u003Ccstdio\u003E\r\n#define N 3410\r\n#define M 13000\r\nusing namespace std;\r\n\r\nint dp[M];\r\n\r\nint main(){\r\n    int n, m;\r\n    int v[M], w[N];\r\n    while (~scanf(\"%d%d\", \u0026n, \u0026m)) {\r\n        memset(dp, 0, sizeof(dp));\r\n        for (int i = 1; i \u003C= n; i++) scanf(\"%d%d\", \u0026w[i], \u0026v[i]);\r\n        for (int i = 1; i \u003C= n; i++) for (int j = m; j \u003E= w[i]; j--) dp[j] = max(dp[j - w[i]] + v[i], dp[j]);\r\n        printf(\"%d\\n\", dp[m]);\r\n    }\r\n    return 0;\r\n}\r\n```\r\n\r\n[\u4f8b\u9898\uff1aPOJ1837](https://vjudge.net/contest/703263#problem/C)\r\n\r\n```cpp\r\n#include\u003Ciostream\u003E\r\nusing namespace std;\r\nint C, G;\r\nint dp[21][15001];\r\nint loc[21];\r\nint w[21];\r\n\r\nint main(){\r\n    cin \u003E\u003E C \u003E\u003E G;\r\n    for (int i = 1; i \u003C= C; i++) cin \u003E\u003E loc[i];\r\n    for (int i = 1; i \u003C= G; i++) cin \u003E\u003E w[i];\r\n    dp[0][7500] = 1;\r\n    for (int i = 1; i \u003C= G; i++){\r\n        for (int j = 1; j \u003C= 15000; j++){\r\n            for (int k = 1; k \u003C= C; k++) dp[i][j] += dp[i - 1][j - w[i] * loc[k]];\r\n        }\r\n    }\r\n    cout \u003C\u003C dp[G][7500] \u003C\u003C endl;\r\n}\r\n```\r\n\r\n## \u5b8c\u5168\u80cc\u5305\r\n\r\n\u9012\u63a8\u5173\u7cfb\uff1a$dp[i + 1][j]$\uff1a\u4ece\u524di\u79cd\u7269\u54c1\u4e2d\u6311\u9009\u603b\u91cd\u91cf\u4e0d\u8d85\u8fc7j\u65f6\u603b\u4ef7\u503c\u7684\u6700\u5927\u503c\r\n$$\r\ndp[i + 1][j] = \r\n\\begin{cases}\r\n\t0, i = 0;\\cr\r\n\tmax(dp[i][j], dp[i][j - k \\cdot w[i]] + k \\cdot v[i]), else\r\n\\end{cases}\r\n$$\r\n\r\n```cpp\r\nint dp[MAX_N + 1][MAX_W + 1];\r\n\r\nvoid solve(){\r\n    for (int j = 0; i \u003C n; i++){\r\n        for (int j = 0; j \u003C= W; j++){\r\n            for (int k = 0; k * w[i] \u003C= j; k++) dp[i + 1][j] = max(dp[i][j], dp[i][j - k * w[i]] + k * v[i]);\r\n        }\r\n    }\r\n    printf(\"%d\\n\", dp[n][W]);\r\n}\r\n```\r\n\r\n\u5f53$j \u003E w[i]$\u65f6\uff0c $dp[i + 1][j] = dp[i + 1][j - w[i]] + v[i]$\r\n\r\n```cpp\r\nvoid solve(){\r\n    for (int j = 0; i \u003C n; i++){\r\n        for (int j = 0; j \u003C= W; j++){\r\n            if (j \u003C w[i]) dp[i + 1][j] = dp[i][j];\r\n            else dp[i + 1][j] = max(dp[i][j], dp[i][j - w[i]] + v[i]);\r\n        }\r\n    }\r\n    printf(\"%d\\n\", dp[n][W]);\r\n}\r\n//\u4e00\u7ef4\r\nvoid solve(){\r\n    for (int i = 0; i \u003C n; i++) for (int j = w[i]; j \u003C= W; j++) dp[j] = max(dp[j], dp[j - w[i]] + v[i]);\r\n    printf(\"%d\\n\", dp[W]);\r\n}\r\n```\r\n\r\n\u4f7f\u7528\u540c\u4e00\u6570\u7ec4\u5b9e\u73b0\u65f6\uff0c01\u80cc\u5305\uff1a\u4ece\u540e\u5f80\u524d\u63a8\uff1b\u5b8c\u5168\u80cc\u5305\uff1a\u4ece\u524d\u5f80\u540e\u63a8\r\n\r\n[\u4f8b\u9898\uff1aPOJ1384]()\r\n\r\n```cpp\r\n#include\u003Cstdio.h\u003E\r\n#include\u003Calgorithm\u003E\r\n#define inf 100000000\t\r\nusing namespace std;\r\n\r\nint dp[11000];\r\nint p[600];\r\nint w[600];\r\n\r\nint main(){\r\n    int k, n, e, f;\r\n    scanf(\"%d\", \u0026k);\r\n    while (k--){\r\n        scanf(\"%d\", \u0026e);\r\n        scanf(\"%d\", \u0026f);\r\n        int diff = f - e;\r\n        scanf(\"%d\", \u0026n);\r\n        for (int i = 1; i \u003C= n; i++){\r\n            scanf(\"%d\", \u0026p[i]);\r\n            scanf(\"%d\", \u0026w[i]);\r\n        }\r\n        for(int i = 0; i \u003C= diff; i++) dp[i] = inf;\r\n        dp[0] = 0;\r\n        for (int i = 1; i \u003C= n; i++) for (int j = w[i]; j \u003C= diff; j++) dp[j] = min(dp[j], dp[j - w[i]] + p[i]);\r\n        if (dp[diff] == inf) printf(\"This is impossible.\\n\");\r\n        else printf(\"The minimum amount of money in the piggy-bank is %d.\\n\",dp[diff]);\r\n    }\r\n}\r\n```\r\n\r\n\u4ee5w\u4e3adp\u5bf9\u8c61\uff1a\r\n\r\n$dp[i + 1][j]$\u8868\u793a\u524di\u4e2a\u7269\u54c1\u4e2d\u6311\u51fa\u603b\u4ef7\u503c\u4e3aj\u65f6\u603b\u91cd\u91cf\u7684\u6700\u5c0f\u503c\r\n\r\n```cpp\r\nint dp[MAX_N + 1][MAX_N * MAX_V + 1];\r\nconst int INF = 0xffffff\r\n\r\nvoid solve(){\r\n    fill(dp[0], dp[0] + MAX_N * MAX_V + 1, INF);\r\n    dp[0][0] = 0;\r\n    for (int j = 0; i \u003C n; i++){\r\n        for (int j = 0; j \u003C= MAX_N * MAX_V; j++){\r\n            if (j \u003C v[i]) dp[i + 1][j] = dp[i][j];\r\n            else dp[i + 1][j] = min(dp[i][j], dp[i][j - v[i]] + w[i]);\r\n        }\r\n    }\r\n    int res = 0;\r\n    for (int i = 0; i \u003C= MAX_N * MAX_V; i++) if (dp[n][i] \u003C= W) res = i;\r\n    printf(\"%d\", res);\r\n}\r\n```\r\n\r\n## \u6700\u957f\u516c\u5171\u5b50\u5e8f\u5217\r\n\r\n$dp[i][j] = s_1, ... , S_i, t_1, ... , t_j$\u5bf9\u5e94LCS\u957f\u5ea6\r\n\r\n1. $s_{i + 1} = t_{j + 1}$, \u672b\u5c3edp\r\n\r\n$$\r\ndp[i + 1][j + 1] = \r\n\\begin{cases}\r\n\tdp[i][j] + 1, s1[i] = s2[j];\\cr\r\n\tmax(dp[i + 1][j], dp[i][j + 1]), else\r\n\\end{cases}\r\n$$\r\n\r\n\r\n\r\n[\u4f8b\u9898\uff1aPOJ1458]()\r\n\r\n```cpp\r\n#include\u003Ccstdio\u003E\r\n#include\u003Calgorithm\u003E\r\n#include\u003Ccstring\u003E\r\nusing namespace std;\r\nconst int maxn = 1000 + 5;\r\nint n, m;\r\nint dp[maxn][maxn];\r\nchar s1[maxn], s2[maxn];\r\n\r\nint main(){\r\n    while (scanf(\"%s%s\", s1, s2) == 2){\r\n        n = strlen(s1);\r\n        m = strlen(s2);\r\n        memset(dp, 0, sizeof(dp));\r\n        for (int i = 0; i \u003C= n; i++){\r\n            for (int j = 0; j \u003C=m; j++){\r\n                if (s1[i] == s2[j]) dp[i + 1][j + 1] = dp[i][j] + 1;\r\n                else dp[i + 1][j + 1] = max(dp[i + 1][j], dp[i][j + 1]);\r\n            }\r\n        }\r\n        printf(\"%d\\n\", dp[n][m]);\r\n    }\r\n    return 0;\r\n}\r\n```\r\n\r\n## \u6700\u957f\u4e0a\u5347\u5b50\u5e8f\u5217\r\n\r\n$dp[i] = max(1, dp[i - 1])$\r\n\r\n[\u4f8b\u9898\uff1aPOJ3903]()\r\n\r\n```cpp\r\n#include\u003Ccstdio\u003E\r\n#include\u003Calgorithm\u003E\r\nusing namespace std;\r\n\r\nint dp[100010];\r\nint a[100010];\r\n\r\nint main(){\r\n\tint N;\r\n\twhile (scanf(\"%d\", \u0026N) != EOF){\r\n\t\tint ans = 0;\r\n\t\tfor (int i = 0; i \u003C N; i++) scanf(\"%d\", \u0026a[i]);\r\n\t\tfor (int i = 0; i \u003C N; i++){\r\n\t\t\tdp[i] = 1;\r\n\t\t\tfor (int j = 0; j \u003C i; j++) if (a[i] \u003E a[j]) dp[i] = max(dp[i], dp[j] + 1);\r\n\t\t\tans = max(ans, dp[i])\r\n\t\t}\r\n\t\tprintf(\"%d\\n\", ans);\r\n\t}\r\n}\r\n```\r\n\r\n## \u591a\u91cd\u90e8\u5206\u548c\r\n\r\n```cpp\r\nint n; \r\nint K;\r\nint a[MAX_N];\r\nint m[MAX_N];\r\nbool dp[MAX_N + 1][MAX_K + 1];\r\nvoid solve(){\r\n\tdp[0][0] = 1;\r\n\tfor (int i = 0; i \u003C n; i++){\r\n\t\tfor (int j = 0; j \u003C K; j++){\r\n\t\t\tfor (int k = 0; k \u003C= m[i] \u0026\u0026 k * a[i] \u003C= j; K++) dp[i + 1][j] |= dp[i][j - k * a[i]];\r\n\t\t} \r\n\t}\r\n\tif (dp[n][k]) printf(\"yes\\n\");\r\n\telse printf(\"no\\n\");\r\n}\r\n```\r\n\r\n```cpp\r\nint n; \r\nint a[MAX_N];\r\nint m[MAX_N];\r\nbool dp[MAX_K + 1];\r\nvoid solve(){\r\n\tmemset(dp, -1, sizeof(dp));\r\n\tdp[0] = 1;\r\n\tfor (int i = 0; i \u003C n; i++){\r\n\t\tfor (int j = 0; j \u003C K; j++){\r\n\t\t\tif (dp[j] \u003E= 0) dp[j] = m[i];\r\n\t\t\telse if (j \u003C a[i] || dp[j - a[i]] \u003C= 0) dp[j] = 0;\r\n\t\t\telse dp[j = dp[j - a[i]]] - 1;\r\n \t\t} \r\n\t}\r\n\tif (dp[k] \u003E= 0) printf(\"yes\\n\");\r\n\telse printf(\"no\\n\");\r\n}\r\n```\r\n\r\n[\u4f8b\u9898\uff1aPOJ1742]()\r\n\r\n```cpp\r\n#include\u003Ciostream\u003E\r\n#include\u003Ccstring\u003E\r\nusing namespace std;\r\n\r\nint num[105]; \r\nint price[105];\r\nint dp[100005];\r\n\r\nint main(){\r\n\tint n, m;\r\n\twhile (cin \u003E\u003E n \u003E\u003E m \u0026\u0026 (n || m)){\r\n\t\tmemset(dp, -1, sizeof(dp));\r\n\t\tfor (int i = 0; i \u003C n; i++) cin \u003E\u003E price[i];\r\n\t\tfor (int i = 0; i \u003C n; i++) cin \u003E\u003E num[i];\r\n\t\tdp[0] = 0;\r\n\t\tfor (int i = 0; i \u003C n; i++){\r\n\t\t\tfor (int j = 0; j \u003C= m; j++){\r\n\t\t\t\tif (dp[j] \u003E= 0) dp[j] = num[i];\r\n\t\t\t\telse if (j \u003C price[i] || dp[j - price[i]] \u003C= 0) dp[j] = -1;\r\n\t\t\t\telse dp[j] = dp[j - price[i]] - 1;\r\n\t\t\t}\r\n\t\t}\r\n\t\tint sum = 0;\r\n\t\tfor (int i = 1; i \u003C= m; i++) if (dp[i] \u003E= 0) sum++;\r\n\t\tcout \u003C\u003C sum \u003C\u003C endl;\r\n\t}\r\n\treturn 0;\r\n}\r\n```"</script>
