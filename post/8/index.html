        <script id="markdown-source" type="application/json">"## vector \u52a8\u6001\u6570\u7ec4\r\n\r\n```cpp\r\n#include\u003Cvector\u003E\r\nusing namespace std;\r\n\r\nvector\u003Cint\u003E vec;\r\nvec.begin();\r\nvec.clear();\r\nvec.empty();\r\nvec.end();\r\nvec.push_back(elem);\r\nvec.size();\r\nvec.resize();\r\n\r\nvec.push_back(2);\r\nvec.push_back(4);\r\n\r\n//\u4e0b\u6807\u904d\u5386\r\nfor (int i = 0; i \u003C vec.size(); ++i)cout \u003C\u003C vec[i] \u003C\u003C \" \";\r\ncout \u003C\u003C endl;\r\n\r\n//\u8fed\u4ee3\u5668\u904d\u5386\r\nvector\u003Cint\u003E::iterator it;\r\nfor (it = vec.begin(); it != vec.end(); ++it) cout \u003C\u003C *it \u003C\u003C \" \";\r\ncout \u003C\u003C endl;\r\n\r\nvec.insert(vec.begin() + 1, 6);//\u7b2c\u4e8c\u4e2a\u4f4d\u7f6e\u63d2\u51656 vec = [2, 6, 4]\r\nvec.erase(vec.begin() + 1);//\u5220\u9664\u7b2c\u4e8c\u4e2a\u4f4d\u7f6e\u7684\u5143\u7d20 vec = [2, 4]\r\n\r\nvec.clear();\r\n```\r\n\r\n[\u4f8b\u9898\uff1aPOJ1208](https://vjudge.net/contest/698956#problem/A)\r\n\r\n``` cpp\r\n#include\u003Ciostream\u003E\r\n#include\u003Ccstdio\u003E\r\n#include\u003Cvector\u003E\r\n#include\u003Cstring\u003E\r\nusing namespace std;\r\n\r\nconst int maxn = 30;\r\nint n;\r\nvector\u003Cint\u003E pile[maxn];\r\n\r\n//\u627e\u6728\u5757a\u6240\u5728\u7684pile\u548cheight\u4ee5\u5f15\u7528\u5f62\u5f0f\u8fd4\u56de\u8c03\u7528\u8005\r\nvoid find_block(int a, int \u0026p, int \u0026h){\r\n    for (p = 0; p \u003C n; p++) for (h = 0; h \u003C pile[p].size(); h++) if (pile[p][h] == a) return;\r\n}\r\n\r\n//\u628a\u7b2cp\u5806\u9ad8\u5ea6\u4e3ah\u7684\u6728\u5757\u4e0a\u65b9\u7684\u6240\u6709\u6728\u5757\u79fb\u56de\u539f\u4f4d\r\nvoid clear_above(int p, int h){\r\n    for (int i = h + 1; i \u003C pile[p].size(); i++){\r\n        int b = pile[p][i];\r\n        pile[b].push_back(b);\r\n    }\r\n    pile[p].resize(h + 1);//\u53ea\u4fdd\u7559\u4e0b\u68070-h\u7684\u5143\u7d20\u8282\u7701\u5185\u5b58\r\n}\r\n\r\n//\u628a\u7b2cp\u5806\u9ad8\u5ea6\u4e3ah\u53ca\u5176\u4e0a\u65b9\u7684\u6728\u5757\u6574\u4f53\u79fb\u52a8\u5230p2\u5806\u7684\u9876\u7aef\r\nvoid place(int p, int h; int p2){\r\n    for (int i = h; i \u003C pile[p].size(); i++) pile[p2].push_back(pile[p][i]);\r\n    pile[i].resize(h);\r\n}\r\n\r\nvoid print(){\r\n    for (int i = 0; i \u003C n; i++){\r\n        printf(\"%d:\", i);\r\n        for (int j = 0; j \u003C pile[i].size(); j++) printf(\" %d\", pile[i][j]);\r\n        printf(\"\\n\");\r\n    }\r\n}\r\n\r\nint main(){\r\n    //freopen(\"in.txt\", \"r\", stdin);\r\n    int a, b;\r\n    cin \u003E\u003E n;\r\n    string s1, s2;\r\n    for (int i = 0; i \u003C n; i++) pile[i].push_back(i);\r\n    while (cin \u003E\u003E s1 \u003E\u003E a \u003E\u003E s2 \u003E\u003E b){\r\n        int pa, pb, ha, hb;\r\n        if (s1 == \"quit\") break;\r\n        find_block(a, pa, ha);\r\n        find_block(b, pb, hb);\r\n        if (pa == pb) continue;\r\n        if (s2 == \"onto\") clear_above(pb, hb);\r\n        if (s1 == \"move\") clear_above(pa, ha);\r\n\r\n        place(pa, ha, pb);\r\n    }\r\n    print();\r\n    return 0;\r\n}\r\n```\r\n\r\n## stack \u6808\r\n\r\n\u540e\u8fdb\u5148\u51fa LIFO\r\n\r\n``` cpp\r\n#include\u003Cstack\u003E\r\nusing namespace std;\r\n\r\nstack\u003Cint\u003E S;\r\nS.push();\r\nS.pop();\r\nS.top;\r\n```\r\n\r\n[\u4f8b\u9898\uff1aPOJ1363](https://vjudge.net/contest/698956#problem/B)\r\n\r\n```cpp\r\n#include\u003Cstack\u003E\r\n#include\u003Ccstdio\u003E\r\nusing namespace std;\r\ntypedef long long LL;\r\n\r\nconst int mx = 1010;\r\nint n, a[mx], i;\r\nbool nfi;\r\n\r\nint main(){\r\n    while (~scanf(\"%d\", \u0026n) \u0026\u0026 n){\r\n        if (nfi) printf(\"\\n\");\r\n        while (~scanf(\"%d\", \u0026a[1]) \u0026\u0026 a[1]){\r\n            for (i = 2; i \u003C= n; ++i) scanf(\"%d\", \u0026a[i]);\r\n            stack\u003Cint\u003E S;\r\n            i = 1;\r\n            for (int j = 1; j \u003C= n; ++j){\r\n                S.push(j);\r\n                while (!S.empty() \u0026\u0026 S.top() == a[i]){\r\n                    S.pop();\r\n                    i++;\r\n                }\r\n            }\r\n            if (S.empty()) printf(\"Yes\\n\");\r\n            else printf(\"No\\n\");\r\n        }\r\n        nfi = true;\r\n    }\r\n    return 0;\r\n}\r\n```\r\n\r\n## queue \u961f\u5217\r\n\r\n```cpp\r\n#include\u003Cqueue\u003E\r\nusing namespace std;\r\n\r\nqueue\u003Cint\u003E que;\r\nque.back();\r\nque.empty();\r\nque.front();\r\nque.pop();\r\nque.push(elem);\r\nque.size();\r\n```\r\n\r\n[\u4f8b\u9898\uff1aPOJ2259](https://vjudge.net/contest/698956#problem/C)\r\n\r\n```cpp\r\n#include\u003Ccstdio\u003E\r\n#include\u003Cqueue\u003E\r\n#include\u003Cstring\u003E\r\n#define maxn 1010\r\nusing namespace std;\r\n\r\nint belong[1000000];\r\n\r\nint main(){\r\n    int T, n, a, t = 0;\r\n    while (~scanf(\"%d\", \u0026T)){\r\n        if (T == 0) break;\r\n        else{\r\n            queue\u003Cint\u003E team[maxn];\r\n            queue\u003Cint\u003E que;\r\n            for (int i - 1; i \u003C= T; i++){\r\n                scanf(\"%d\", \u0026n);\r\n                while(n--){\r\n                    scanf(\"%d\", \u0026a);\r\n                    belong[a] = i;\r\n                }\r\n            }\r\n            printf(\"Scenario #%d\\n\", ++t);\r\n            char command[200];\r\n            while (~scanf(\"%s\", command)){\r\n                if (command[0] == 'S') break;\r\n                if (command[0] == 'E'){\r\n                    int elements, b;\r\n                    scanf(\"%d\", \u0026elements);\r\n                    b = belong[elements];\r\n\r\n                    if (team[b].empty()){\r\n                        que.push(b);\r\n                        team[b].push(elements);\r\n                    }\r\n                    else team[b].push(elements);\r\n                    else if (command == 'D'){\r\n                        int ans = que.front();\r\n                        printf(\"%d\\n\", team[ans].front());\r\n                        team[ans].pop();\r\n                        if (team[ans].empty()) que.pop();\r\n                    }\r\n                }\r\n            }\r\n            printf(\"\\n\")\r\n        }\r\n        return 0;\r\n    }\r\n```"</script>
